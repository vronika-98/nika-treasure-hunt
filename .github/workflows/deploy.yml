name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      vite_passphrase:
        description: VITE_PASSPHRASE for this manual build (max 13 chars)
        required: true
        type: string
      vite_secret_message:
        description: VITE_SECRET_MESSAGE for this manual build
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    environment: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Validate manual inputs
        env:
          VITE_PASSPHRASE: ${{ github.event.inputs.vite_passphrase }}
          VITE_SECRET_MESSAGE: ${{ github.event.inputs.vite_secret_message }}
        run: |
          if [ -z "$VITE_PASSPHRASE" ]; then
            echo "vite_passphrase is empty. Please enter a value when starting the workflow." >&2
            exit 1
          fi
          if [ -z "$VITE_SECRET_MESSAGE" ]; then
            echo "vite_secret_message is empty. Please enter a value when starting the workflow." >&2
            exit 1
          fi
          if [ ${#VITE_PASSPHRASE} -gt 13 ]; then
            echo "vite_passphrase is too long (${#VITE_PASSPHRASE}). Max allowed is 13 characters." >&2
            exit 1
          fi
          echo "Inputs received (lengths): passphrase=${#VITE_PASSPHRASE}, secret_message=${#VITE_SECRET_MESSAGE}"

      - name: Build
        env:
          VITE_PASSPHRASE: ${{ github.event.inputs.vite_passphrase }}
          VITE_SECRET_MESSAGE: ${{ github.event.inputs.vite_secret_message }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
