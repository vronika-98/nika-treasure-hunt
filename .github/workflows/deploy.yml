name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      vite_passphrase:
        description: VITE_PASSPHRASE for this manual build
        required: true
        type: string
      vite_secret_message:
        description: VITE_SECRET_MESSAGE for this manual build
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (push)
        if: github.event_name != 'workflow_dispatch'
        env:
          VITE_PASSPHRASE: ${{ secrets.VITE_PASSPHRASE }}
          VITE_SECRET_MESSAGE: ${{ secrets.VITE_SECRET_MESSAGE }}
        run: npm run build

      - name: Build (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          VITE_PASSPHRASE: ${{ inputs.vite_passphrase }}
          VITE_SECRET_MESSAGE: ${{ inputs.vite_secret_message }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
